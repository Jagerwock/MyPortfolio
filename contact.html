<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Contact Flavio Priano to build high-performance websites and full-stack web apps.">
  <meta property="og:title" content="Contact — Flavio Priano">
  <meta property="og:description" content="Start your website or web app project with Flavio Priano.">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header">
  <div class="container nav-wrap">
    <a class="wordmark" href="index.html">Flavio Priano</a>
    <nav class="nav-links" aria-label="Primary">
      <a data-nav-link href="work.html">Work</a>
      <a data-nav-link href="about.html">About</a>
      <a data-nav-link href="contact.html">Contact</a>
    </nav>
    <button id="mobileToggle" class="mobile-toggle" aria-expanded="false" aria-controls="mobilePanel" aria-label="Open menu">☰</button>
  </div>
  <div id="mobileBackdrop" class="mobile-backdrop" aria-hidden="true"></div>
  <nav id="mobilePanel" class="mobile-panel" aria-label="Mobile menu"></nav>
</header>
<main id="main" class="section">
  <div class="container reveal">
    <p class="section-label">Contact</p>
    <h1>Let’s discuss your next web project.</h1>
    <p>Share your goals, constraints and timeline. I’ll reply with practical next steps.</p>
    <form id="contactForm" class="contact-form" data-endpoint="http://localhost:3000/api/contact" novalidate>
      <div class="form-row">
        <label class="field" for="name">Name
          <input id="name" name="name" autocomplete="name" required>
        </label>
        <label class="field" for="email">Email
          <input id="email" type="email" name="email" autocomplete="email" required>
        </label>
      </div>
      <label class="field" for="message">Project details
        <textarea id="message" name="message" rows="7" required></textarea>
      </label>
      <label class="hp-field" for="website">Website (leave empty)
        <input id="website" type="text" name="website" autocomplete="off" tabindex="-1">
      </label>
      <button class="btn primary" type="submit">Send message</button>
      <p id="formStatus" class="status" aria-live="polite"></p>
    </form>
  </div>
</main>
<button id="backToTop" class="back-to-top" aria-label="Back to top">↑</button>
<footer class="site-footer"><div class="container">© 2026 Flavio Priano — Web Developer.</div></footer>

</body>
